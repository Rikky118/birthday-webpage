<script>

/* LOGIN */

function openPage(){

var code=document.getElementById("code").value;

if(code=="1988/11/05"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("loginMusic").pause();
document.getElementById("bgVideo").style.display="block";

confetti({

});

typingEffect();

/* TYPING EFFECT */

var message="Happy Birthday to My Idol virat.👀🫶🏻You are not just special to me… you are my inspiration, my ideal, and someone I truly admire.The way you carry yourself, your strength, your kindness — everything about you motivates me to grow and become better. You’ve shown me what it means to be strong and genuine, and that’s something I’ll always look up to.I’m really grateful to have you in my life. You mean more than words can explain.Wishing you endless happiness, success, and all the good things you deserve. Keep inspiring me always.✨🌍"

var i=0;

function typingEffect(){
if(i<message.length){

document.getElementById("typing").innerHTML+=message.charAt(i);
i++;
setTimeout(typingEffect,40);

}

}


/* ALBUM */

var images=["pic1.jpg","pic2.jpg","pic3.jpg"];
var index=0;

function showAlbum(){

document.getElementById("wish").style.display="none";
document.getElementById("album").style.display="block";

slideShow();

}

function slideShow(){

document.getElementById("slide").src=images[index];

index++;

if(index>=images.length){

index=0;

}

setTimeout(slideShow,2000);

}

/* MEMORIES */

function showMemories(){

document.getElementById("album").style.display="none";
document.getElementById("memories").style.display="block";

}

/* VIDEO */

function showVideo(){

document.getElementById("memories").style.display="none";
document.getElementById("video").style.display="block";

}
you
/* HEARTS */

function startHearts(){

setInterval(function(){

var heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=Math.random()>0.5?"🤎":"🤍";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(function(){

heart.remove();

},6000);

},500);

}

</script>
